name: Simple CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  run-tests:
    name: Run Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run tests
        run: |
          python -c "assert 1+1==2"
          python -c "assert 'hello' == 'hello'"
          python -c "assert len([1,2,3]) == 3"
          python -c "assert True is True"
          python -c "assert False is False"
          echo "✅ All tests passed!"
